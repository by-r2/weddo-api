$kind: http-request
description: >-
  Confirma presença de um convidado no convite identificado por `code` (mesmo do
  cadastro do convite). O nome deve ser o cadastrado naquele convite.


  - **200**: Confirmado com sucesso

  - **404**: Convite ou convidado não encontrado

  - **409**: Tentativa de confirmar quando já confirmado, ou convidado recusado tentando confirmar
  - **200** com `will_attend: false`: recusa registrada ou já estava recusado (idempotente)
url: "{{baseUrl}}/w/{{weddingId}}/rsvp"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "code": "{{invitationCode}}",
      "name": "João Silva",
      "will_attend": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200 ou 409', () => {
        const body = pm.response.json();
        const declined = body.guest && body.guest.status === 'declined';
        if (declined) {
          pm.expect(pm.response.code).to.equal(200);
        } else {
          pm.expect(pm.response.code).to.be.oneOf([200, 409]);
        }
      });
      pm.test('Tem mensagem', () => {
        pm.expect(pm.response.json().message).to.be.a('string');
      });
    language: text/javascript
order: 1000

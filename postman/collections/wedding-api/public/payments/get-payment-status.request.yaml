$kind: http-request
description: Polling do status de um pagamento (usado enquanto aguarda PIX).
url: "{{baseUrl}}/w/{{weddingId}}/payments/{{paymentId}}/status"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Tem status', () => {
        pm.expect(pm.response.json().status).to.be.a('string');
      });
    language: text/javascript
order: 1000

$kind: http-request
description: Exporta os dados do tenant para o Google Sheets (abas de convites,
  convidados, presentes e pagamentos).
url: "{{baseUrl}}/admin/sheets/push"
method: POST
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200 ou 503', () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 503]);
      });
    language: text/javascript
order: 2000

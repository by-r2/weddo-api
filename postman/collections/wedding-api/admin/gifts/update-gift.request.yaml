$kind: http-request
url: "{{baseUrl}}/admin/gifts/{{giftId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Jogo de Panelas Premium",
      "description": "Jogo com 7 peças antiaderente",
      "price": 450.00,
      "image_url": "https://img.example.com/panelas-premium.jpg",
      "category": "Cozinha"
    }
scripts:
  - type: afterResponse
    code: pm.test('Status 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 5000

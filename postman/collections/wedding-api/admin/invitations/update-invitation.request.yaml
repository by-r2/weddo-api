$kind: http-request
description: Atualiza os dados do convite (não altera guests).
url: "{{baseUrl}}/admin/invitations/{{invitationId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "code": "SILVA-001",
      "label": "Família Silva (atualizado)",
      "max_guests": 4,
      "notes": "Mesa 5"
    }
scripts:
  - type: afterResponse
    code: pm.test('Status 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 4000

$kind: http-request
description: "Atualiza dados e/ou status do convidado. Status aceitos:
  `pending`, `confirmed`, `declined`."
url: "{{baseUrl}}/admin/guests/{{guestId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "João Silva",
      "phone": "11999997777",
      "email": "joao@email.com",
      "status": "confirmed"
    }
scripts:
  - type: afterResponse
    code: pm.test('Status 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 3000

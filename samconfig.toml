# Configuração do SAM CLI para weddo-api
# CI/CD (GitHub Actions) usa infra/sam/params/*.txt + segredos — ver .github/workflows/ci-deploy.yml
# Documentação: https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html

version = 0.1

[default.build.parameters]
cached   = true
parallel = true

[prod.global.parameters]
stack_name = "weddo-api-prod"
region     = "us-east-1"

[prod.deploy.parameters]
capabilities      = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
confirm_changeset = true
resolve_s3        = true
s3_prefix         = "weddo-api"
# DatabaseURL e JWTSecret não ficam aqui (contêm segredos) — o SAM CLI pedirá
# interativamente durante o primeiro deploy e salvará no histórico da stack.
parameter_overrides = [
  "Stage=prod",
  "LambdaMemoryMB=512",
  "CORSAllowedOrigins=*",
  "RunMigrations=false",
  "MPPixExpirationMinutes=30",
]
